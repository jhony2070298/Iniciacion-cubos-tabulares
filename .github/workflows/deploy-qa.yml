name: Deploy to QA

on:
  pull_request:
    branches: [ master ]

jobs:
  deploy-qa:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to QA
        shell: powershell
        run: |
          $te = "C:\Program Files (x86)\Tabular Editor\TabularEditor.exe"
          $model = "$env:GITHUB_WORKSPACE\Model.bim"
          $db = "${{ secrets.QA_DB_NAME }}"
          Write-Host "Ruta del modelo: $model"
          & $te $model -deploy localhost $db -O -C -P
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "Deploy a QA exitoso"